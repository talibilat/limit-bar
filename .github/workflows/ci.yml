name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: macos-14
    timeout-minutes: 30
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.2.app/Contents/Developer
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Verify toolchain
        run: scripts/check-toolchain.sh

      - name: Check changed lines for whitespace errors
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: git diff --check "$BASE_SHA" "$HEAD_SHA"

      - name: Test core
        run: swift test --package-path LimitBarCore

      - name: Validate migrations with release tooling
        run: scripts/validate-migrations.sh

      - name: Verify file-access policy
        run: scripts/validate-file-access-policy.sh

      - name: Test app-owned persistence
        run: >-
          xcodebuild test
          -project LimitBar.xcodeproj
          -scheme LimitBar
          -destination 'platform=macOS'
          -only-testing:LimitBarTests
          CODE_SIGN_IDENTITY=-

      - name: Build unsigned app
        run: >-
          xcodebuild
          -project LimitBar.xcodeproj
          -scheme LimitBar
          -configuration Release
          -destination 'platform=macOS'
          CODE_SIGNING_ALLOWED=NO
          build
